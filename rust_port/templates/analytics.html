<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Analytics</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#111; color:#eee; padding:16px; }
h1 { font-size:20px; margin-bottom:4px; display:flex; align-items:center; gap:12px; }
h1 a { font-size:14px; color:#3b82f6; text-decoration:none; }
.subtitle { font-size:12px; color:#666; margin-bottom:16px; }
.day-card { background:#1a1a1a; border-radius:8px; margin-bottom:8px; overflow:hidden; }
.day-header { display:flex; align-items:center; padding:12px 16px; cursor:pointer; }
.day-header:hover { background:#222; }
.day-header .date { font-size:15px; font-weight:600; flex:1; }
.day-header .counts { display:flex; gap:16px; font-size:14px; margin-right:12px; }
.day-header .counts .in { color:#22c55e; } .day-header .counts .out { color:#ef4444; }
.day-header .arrow { color:#555; font-size:12px; transition:transform .2s; }
.day-header .arrow.open { transform:rotate(90deg); }
.day-body { display:none; padding:0 16px 16px; }
.day-body.open { display:block; }
.cap-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:8px; }
.cap-card { background:#222; border-radius:6px; overflow:hidden; }
.cap-card img { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; }
.cap-card .info { padding:6px 8px; font-size:11px; color:#888; display:flex; justify-content:space-between; }
.cap-card .info .dir-in { color:#22c55e; font-weight:600; } .cap-card .info .dir-out { color:#ef4444; font-weight:600; }
.empty, .loading { text-align:center; color:#666; padding:40px; }
</style>
</head>
<body>
<h1><a href="/">← Back</a> Daily Analytics</h1>
<div class="subtitle" id="subtitle">Loading...</div>
<div id="container"><div class="loading">Loading captures...</div></div>
<script>
function load() {
  fetch('/api/captures/all').then(r=>r.json()).then(all=>{
    if (!all || !all.length) { document.getElementById('container').innerHTML = '<div class="empty">No captures yet</div>'; document.getElementById('subtitle').textContent = 'No data'; return; }
    const days = {}; let ti=0, to=0;
    for (const c of all) {
      const day = c.timestamp.substring(0,8);
      if (!days[day]) days[day] = {captures:[], in:0, out:0};
      days[day].captures.push(c);
      if (c.direction === 'in') { days[day].in++; ti++; } else { days[day].out++; to++; }
    }
    const sorted = Object.keys(days).sort((a,b)=>b.localeCompare(a));
    document.getElementById('subtitle').textContent = `${all.length} total · ${ti} in · ${to} out · ${sorted.length} days`;
    let html = '';
    for (const day of sorted) {
      const d = days[day];
      const dateStr = `${day.substring(6,8)}/${day.substring(4,6)}/${day.substring(0,4)}`;
      html += `<div class="day-card"><div class="day-header" onclick="toggleDay('${day}')"><span class="date">${dateStr}</span><span class="counts"><span class="in">↑ ${d.in}</span><span class="out">↓ ${d.out}</span></span><span class="arrow" id="arrow-${day}">▶</span></div><div class="day-body" id="body-${day}"><div class="cap-grid">`;
      for (const c of d.captures) {
        const dc = c.direction === 'in' ? 'dir-in' : 'dir-out';
        const ts = c.timestamp.length >= 15 ? `${c.timestamp.substring(9,11)}:${c.timestamp.substring(11,13)}:${c.timestamp.substring(13,15)}` : c.timestamp;
        html += `<div class="cap-card"><a href="${c.url}" target="_blank"><img src="${c.thumb_url}" loading="lazy"></a><div class="info"><span class="${dc}">${c.direction}</span><span>${ts}</span></div></div>`;
      }
      html += `</div></div></div>`;
    }
    document.getElementById('container').innerHTML = html;
  }).catch(()=>{ document.getElementById('container').innerHTML = '<div class="empty">Error loading</div>'; });
}
function toggleDay(day) { document.getElementById('body-'+day).classList.toggle('open'); document.getElementById('arrow-'+day).classList.toggle('open'); }
load();
</script>
</body>
</html>
