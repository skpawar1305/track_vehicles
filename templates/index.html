<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Line Counter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #111; color: #eee; height: 100vh; overflow: hidden; }
#app { display: flex; height: 100vh; }
#video-panel { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; }
#video-panel img { max-width: 100%; max-height: 100%; display: block; }
#video-panel canvas { position: absolute; width: 100%; height: 100%; cursor: crosshair; }
#sidebar { width: 320px; background: #1a1a1a; padding: 16px; display: flex; flex-direction: column; gap: 12px; border-left: 1px solid #333; overflow-y: auto; }
.section { background: #222; border-radius: 8px; padding: 12px; }
.section h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 8px; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
.btn-primary { background: #3b82f6; color: #fff; }
.btn-danger { background: #ef4444; color: #fff; }
.btn-secondary { background: #444; color: #eee; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.toolbar { display: flex; gap: 6px; flex-wrap: wrap; }
input[type="text"], input[type="number"], input[type="password"] { width: 100%; padding: 6px 8px; background: #333; border: 1px solid #555; border-radius: 6px; color: #eee; font-size: 14px; }
input:focus { outline: none; border-color: #3b82f6; }
.counters { display: flex; gap: 16px; }
.counter { flex: 1; text-align: center; padding: 12px; border-radius: 6px; background: #1a1a1a; }
.counter .value { font-size: 32px; font-weight: 700; }
.counter .label { font-size: 11px; text-transform: uppercase; color: #888; margin-top: 4px; }
.counter-in .value { color: #22c55e; }
.counter-out .value { color: #ef4444; }
#captures { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
#captures img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 4px; background: #333; cursor: pointer; }
#captures .empty { grid-column: 1/-1; text-align: center; color: #666; font-size: 12px; padding: 20px; }
#status-bar { display: flex; gap: 12px; font-size: 12px; color: #888; flex-wrap: wrap; }
.status-item { display: flex; align-items: center; gap: 4px; }
#line-status { font-size: 11px; color: #888; margin-top: 6px; min-height: 16px; }
</style>
</head>
<body>
<div id="app">
  <div id="video-panel">
    <img id="mjpeg-stream" src="/video_feed" alt="Live stream">
    <canvas id="line-canvas"></canvas>
  </div>
  <div id="sidebar">
    <div class="section">
      <h3>Stream</h3>
      <div style="display:flex;gap:8px">
        <div style="flex:2"><label style="font-size:10px;color:#666">IP</label>
          <input type="text" id="ip" value="192.168.0.229"></div>
        <div style="flex:1"><label style="font-size:10px;color:#666">RTSP Port</label>
          <input type="number" id="rtsp-port" value="554"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:6px">
        <div style="flex:1"><label style="font-size:10px;color:#666">Channel</label>
          <input type="number" id="channel" value="1" min="0" max="99"></div>
        <div style="flex:1"><label style="font-size:10px;color:#666">Stream (0=main,1=sub)</label>
          <input type="number" id="stream-type" value="1" min="0" max="1"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:6px">
        <div style="flex:2"><label style="font-size:10px;color:#666">Password</label>
          <input type="password" id="password"></div>
        <div style="display:flex;align-items:flex-end">
          <button class="btn btn-sm btn-secondary" id="connect-btn" style="height:34px">Apply</button>
        </div>
      </div>
    </div>

    <div class="section">
      <h3>Detection Zone</h3>
      <div class="toolbar">
        <button class="btn btn-sm btn-primary" id="draw-roi-btn">Draw Zone</button>
        <button class="btn btn-sm btn-primary" id="draw-btn">Draw Line</button>
        <button class="btn btn-sm btn-danger" id="clear-btn">Clear</button>
        <button class="btn btn-sm btn-secondary" id="save-roi-btn">Save</button>
      </div>
      <div id="line-status">Click 4 points for detection zone, then 2 points for counting line</div>
    </div>

    <div class="section">
      <h3>Vehicle Types</h3>
      <div id="vehicle-checks" style="display:flex;flex-wrap:wrap;gap:4px;font-size:13px"></div>
    </div>

    <div class="section">
      <h3>Counts</h3>
      <div class="counters">
        <div class="counter counter-in"><div class="value" id="count-in">0</div><div class="label">In</div></div>
        <div class="counter counter-out"><div class="value" id="count-out">0</div><div class="label">Out</div></div>
      </div>
      <button class="btn btn-sm btn-danger" id="reset-btn" style="margin-top:8px;width:100%">Reset Counts</button>
      <button class="btn btn-sm btn-secondary" id="flip-btn" style="margin-top:4px;width:100%">⇄ Flip IN/OUT Sides</button>
    </div>

    <div class="section" style="flex:1;min-height:100px">
      <h3>Recent Captures
        <span style="float:right;font-size:11px">
          <a href="/analytics" style="color:#22c55e;text-decoration:none">Analytics</a>
          <span style="color:#444">·</span>
          <a href="/captures" style="color:#3b82f6;text-decoration:none">All</a>
        </span>
      </h3>
      <div id="captures"><div class="empty">Waiting for crossings...</div></div>
    </div>

    <div id="status-bar">
      <span class="status-item"><span style="width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block"></span>Live</span>
      <span class="status-item" id="fps-display">FPS: --</span>
    </div>
  </div>
</div>

<script>
let roiPoints = [], savedRoi = null, linePoints = [], savedLine = null;
let mode = null; // 'roi' or 'line'
let canvas, ctx, img;

function init() {
  canvas = document.getElementById('line-canvas');
  ctx = canvas.getContext('2d');
  img = document.getElementById('mjpeg-stream');

  function resize() {
    const panel = document.getElementById('video-panel');
    const pr = panel.getBoundingClientRect();
    const ir = img.getBoundingClientRect();
    if (ir.width === 0 || ir.height === 0) return;
    canvas.width = ir.width; canvas.height = ir.height;
    canvas.style.width = ir.width + 'px'; canvas.style.height = ir.height + 'px';
    canvas.style.left = (ir.left - pr.left) + 'px'; canvas.style.top = (ir.top - pr.top) + 'px';
    redraw();
  }

  if (img.complete) resize();
  img.addEventListener('load', resize);
  window.addEventListener('resize', resize);
  setTimeout(resize, 500);

  loadConfig(); loadRoi(); loadLine(); loadCounts(); loadCaptures(); loadVehicleTypes();
  setInterval(loadCounts, 2000); setInterval(loadCaptures, 3000);
  canvas.addEventListener('click', onCanvasClick);

  document.getElementById('draw-roi-btn').addEventListener('click', startRoi);
  document.getElementById('draw-btn').addEventListener('click', startLine);
  document.getElementById('clear-btn').addEventListener('click', clearAll);
  document.getElementById('save-roi-btn').addEventListener('click', saveAll);
  document.getElementById('reset-btn').addEventListener('click', () => { if (confirm('Reset?')) fetch('/api/reset',{method:'POST'}); });
  document.getElementById('flip-btn').addEventListener('click', flipSides);
  document.getElementById('connect-btn').addEventListener('click', applyStream);
}

function startRoi() {
  mode = 'roi'; roiPoints = []; linePoints = [];
  document.getElementById('line-status').textContent = 'Click 4 corners of detection zone';
  redraw();
}

function startLine() {
  if (!savedRoi && roiPoints.length < 4) {
    document.getElementById('line-status').textContent = 'Draw detection zone first';
    return;
  }
  mode = 'line'; linePoints = [];
  document.getElementById('line-status').textContent = 'Click 2 points for counting line';
  redraw();
}

function onCanvasClick(e) {
  if (!mode) return;
  const r = img.getBoundingClientRect();
  if (r.width === 0) return;
  const sx = (img.naturalWidth || 1) / r.width, sy = (img.naturalHeight || 1) / r.height;
  const x = Math.round((e.clientX - r.left) * sx), y = Math.round((e.clientY - r.top) * sy);
  if (mode === 'roi') {
    roiPoints.push({x, y}); redraw();
    if (roiPoints.length === 4) {
      mode = null;
      document.getElementById('line-status').textContent = 'Zone drawn. Now draw the counting line or click Save.';
    } else {
      document.getElementById('line-status').textContent = `Click corner ${roiPoints.length + 1} of 4`;
    }
  } else if (mode === 'line') {
    linePoints.push({x, y}); redraw();
    if (linePoints.length === 2) {
      mode = null;
      document.getElementById('line-status').textContent = 'Line drawn. Click Save.';
    } else {
      document.getElementById('line-status').textContent = 'Click second point';
    }
  }
}

function getImgScale() {
  const r = img.getBoundingClientRect(), cr = canvas.getBoundingClientRect();
  const sx = (img.naturalWidth||1) > 0 ? r.width / img.naturalWidth : 1;
  const sy = (img.naturalHeight||1) > 0 ? r.height / img.naturalHeight : 1;
  return { sx, sy, ox: r.left - cr.left, oy: r.top - cr.top };
}

function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const { sx, sy, ox, oy } = getImgScale();
  const activeRoi = savedRoi || roiPoints;
  const activeLine = savedLine || linePoints;

  // Draw ROI quadrilateral + bounding rect
  if (activeRoi.length === 4) {
    const pts = activeRoi.map(p => [p.x * sx + ox, p.y * sy + oy]);
    ctx.strokeStyle = savedRoi ? '#ffb347' : '#fbbf24'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < 4; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.closePath(); ctx.stroke();
    ctx.fillStyle = savedRoi ? 'rgba(255,179,71,0.08)' : 'rgba(251,191,36,0.08)';
    ctx.fill();

    // bounding rect
    const xs = activeRoi.map(p => p.x), ys = activeRoi.map(p => p.y);
    const bx1 = Math.min(...xs) * sx + ox, by1 = Math.min(...ys) * sy + oy;
    const bx2 = Math.max(...xs) * sx + ox, by2 = Math.max(...ys) * sy + oy;
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.setLineDash([4,4]);
    ctx.strokeRect(bx1, by1, bx2 - bx1, by2 - by1);
    ctx.setLineDash([]);

    for (let i = 0; i < 4; i++) {
      ctx.beginPath(); ctx.arc(pts[i][0], pts[i][1], 5, 0, 2 * Math.PI);
      ctx.fillStyle = '#fbbf24'; ctx.fill();
    }
  }

  // Draw counting line
  if (activeLine.length === 2) {
    const p1 = { x: activeLine[0].x * sx + ox, y: activeLine[0].y * sy + oy };
    const p2 = { x: activeLine[1].x * sx + ox, y: activeLine[1].y * sy + oy };
    ctx.strokeStyle = savedLine ? '#3b82f6' : '#60a5fa'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
    for (const p of [p1, p2]) {
      ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, 2 * Math.PI);
      ctx.fillStyle = '#60a5fa'; ctx.fill();
    }
  }

  // Draw points in progress
  const currentRoi = !savedRoi ? roiPoints : [];
  for (const p of currentRoi) {
    ctx.beginPath(); ctx.arc(p.x * sx + ox, p.y * sy + oy, 6, 0, 2 * Math.PI);
    ctx.fillStyle = '#fbbf24'; ctx.fill();
  }
  const currentLine = !savedLine ? linePoints : [];
  for (const p of currentLine) {
    ctx.beginPath(); ctx.arc(p.x * sx + ox, p.y * sy + oy, 6, 0, 2 * Math.PI);
    ctx.fillStyle = '#60a5fa'; ctx.fill();
  }
}

function saveAll() {
  const status = document.getElementById('line-status');
  const ok = [];
  if (roiPoints.length === 4) {
    const roi = roiPoints.map(p => [p.x, p.y]);
    fetch('/api/roi', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({roi})})
      .then(r=>r.json()).then(d => { if (d.status === 'ok') { savedRoi = roiPoints.slice(); ok.push('roi'); maybeDone(); } });
  }
  if (linePoints.length === 2) {
    const line = [linePoints[0].x, linePoints[0].y, linePoints[1].x, linePoints[1].y];
    fetch('/api/line', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({line})})
      .then(r=>r.json()).then(d => { if (d.status === 'ok') { savedLine = linePoints.slice(); ok.push('line'); maybeDone(); } });
  }
  if (roiPoints.length + linePoints.length === 0) {
    status.textContent = 'Draw a zone and/or line first';
  }
  function maybeDone() {
    if (ok.length > 0) { status.textContent = 'Saved!'; redraw(); }
  }
}

function clearAll() {
  mode = null; roiPoints = []; linePoints = []; savedRoi = null; savedLine = null;
  fetch('/api/roi', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({roi:null})});
  fetch('/api/line', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({line:null})});
  document.getElementById('line-status').textContent = 'Cleared';
  redraw();
}

function loadRoi() {
  fetch('/api/roi').then(r=>r.json()).then(d => {
    if (d.roi && d.roi.length === 4) {
      savedRoi = d.roi.map(p => ({x: p[0], y: p[1]}));
      document.getElementById('line-status').textContent = 'Zone loaded';
      redraw();
    }
  });
}

function loadLine() {
  fetch('/api/line').then(r=>r.json()).then(d => {
    if (d.line && d.line.length === 4) {
      savedLine = [{x:d.line[0],y:d.line[1]},{x:d.line[2],y:d.line[3]}];
      redraw();
    }
  });
}

function loadConfig() {
  fetch('/api/config').then(r=>r.json()).then(d=>{
    if (!d.stream_url) return;
    const m = d.stream_url.match(/^rtsp:\/\/([^:]+):([^@]+)@([^:]+):(\d+)\/.*\/c(\d+)\/s(\d+)\//);
    if (m) {
      document.getElementById('ip').value = m[3]; document.getElementById('rtsp-port').value = m[4];
      document.getElementById('channel').value = m[5]; document.getElementById('stream-type').value = m[6];
      document.getElementById('password').value = decodeURIComponent(m[2]);
    } else {
      const m2 = d.stream_url.match(/^rtsp:\/\/([^:]+):([^@]+)@([^:]+):(\d+)\//);
      if (m2) { document.getElementById('ip').value = m2[3]; document.getElementById('password').value = decodeURIComponent(m2[2]); }
    }
  });
}

function applyStream() {
  const ip = document.getElementById('ip').value.trim(), port = document.getElementById('rtsp-port').value;
  const ch = document.getElementById('channel').value, st = document.getElementById('stream-type').value;
  const pass = document.getElementById('password').value;
  const url = `rtsp://admin:${encodeURIComponent(pass)}@${ip}:${port}/unicast/c${ch}/s${st}/live`;
  fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({stream_url:url})}).then(()=>location.reload());
}

function flipSides() {
  fetch('/api/config').then(r=>r.json()).then(d=>{
    fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({flip_sides:!d.flip_sides})});
  });
}

function loadCounts() { fetch('/api/counts').then(r=>r.json()).then(d=>{ document.getElementById('count-in').textContent = d.in||0; document.getElementById('count-out').textContent = d.out||0; }); }
function loadCaptures() {
  fetch('/api/captures').then(r=>r.json()).then(d=>{
    const el = document.getElementById('captures');
    if (!d || d.length === 0) { el.innerHTML = '<div class="empty">Waiting for crossings...</div>'; return; }
    el.innerHTML = d.map(c=>`<a href="${c.url}" target="_blank"><img src="${c.thumb_url}" loading="lazy"></a>`).join('');
  });
}
function loadVehicleTypes() {
  const CLASSES = {2:'car',3:'motorcycle',5:'bus',7:'truck'};
  fetch('/api/config').then(r=>r.json()).then(d=>{
    const enabled = d.enabled_classes || [2,3,5,7];
    document.getElementById('vehicle-checks').innerHTML = Object.entries(CLASSES).map(([id,name])=>{
      const checked = enabled.includes(parseInt(id)) ? 'checked' : '';
      return `<label style="display:flex;align-items:center;gap:4px;padding:2px 6px;background:#2a2a2a;border-radius:4px;cursor:pointer"><input type="checkbox" value="${id}" ${checked} onchange="saveVehicleTypes()"> ${name}</label>`;
    }).join('');
  });
}
function saveVehicleTypes() {
  const classes = Array.from(document.querySelectorAll('#vehicle-checks input:checked')).map(c=>parseInt(c.value));
  fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled_classes:classes})});
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
