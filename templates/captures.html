<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Captures Gallery</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #111; color: #eee; padding: 16px; }
h1 { font-size: 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
h1 a { font-size: 14px; color: #3b82f6; text-decoration: none; }
.toolbar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
.btn { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
.btn-danger { background: #ef4444; color: #fff; }
.btn-danger:disabled { background: #444; cursor: default; }
.btn-secondary { background: #444; color: #eee; }
.btn-active { background: #3b82f6; color: #fff; }
.count { font-size: 13px; color: #888; }
#grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
.card { background: #1a1a1a; border-radius: 8px; overflow: hidden; cursor: pointer; border: 2px solid transparent; position: relative; }
.card.selected { border-color: #3b82f6; }
.card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
.card .info { padding: 6px 8px; font-size: 11px; color: #888; display: flex; justify-content: space-between; }
.empty { text-align: center; color: #666; padding: 40px; font-size: 14px; grid-column: 1/-1; }
.sep { width: 1px; height: 24px; background: #444; }
</style>
</head>
<body>
<h1><a href="/">← Back</a> Captures Gallery <span class="count" id="count-label"></span></h1>
<div class="toolbar">
  <button class="btn btn-secondary btn-active" id="filter-all" onclick="setFilter('all')">All</button>
  <button class="btn btn-secondary" id="filter-in" onclick="setFilter('in')">In</button>
  <button class="btn btn-secondary" id="filter-out" onclick="setFilter('out')">Out</button>
  <span class="sep"></span>
  <button class="btn btn-danger" id="delete-btn" disabled>Delete Selected</button>
  <button class="btn btn-secondary" id="select-all-btn">Select All</button>
</div>
<div id="grid"><div class="empty">Loading...</div></div>
<script>
let allCaptures = [], selected = new Set(), filter = 'all';
function load() { fetch('/api/captures/all').then(r=>r.json()).then(d=>{ allCaptures = d; render(); }); }
function setFilter(f) { filter = f; selected.clear(); document.querySelectorAll('.btn-active').forEach(b=>b.classList.remove('btn-active')); document.getElementById('filter-'+f).classList.add('btn-active'); render(); }
function filtered() { return filter === 'all' ? allCaptures : allCaptures.filter(c=>c.direction === filter); }
function render() {
  const grid = document.getElementById('grid'), shown = filtered();
  document.getElementById('count-label').textContent = allCaptures.length > 0 ? `(${allCaptures.length})` : '';
  if (shown.length === 0) { grid.innerHTML = '<div class="empty">'+(allCaptures.length===0?'No captures yet':'No '+filter+' captures')+'</div>'; return; }
  grid.innerHTML = shown.map(c=>`<div class="card${selected.has(c.filename)?' selected':''}" onclick="toggle('${c.filename}')"><img src="${c.thumb_url}" loading="lazy"><div class="info"><span>${c.direction}</span><span>${c.timestamp}</span></div></div>`).join('');
  document.getElementById('delete-btn').disabled = selected.size === 0;
}
function toggle(fn) { selected.has(fn) ? selected.delete(fn) : selected.add(fn); render(); }
document.getElementById('select-all-btn').addEventListener('click', ()=>{
  const shown = filtered().map(c=>c.filename);
  shown.every(f=>selected.has(f)) ? shown.forEach(f=>selected.delete(f)) : shown.forEach(f=>selected.add(f));
  render();
});
document.getElementById('delete-btn').addEventListener('click', ()=>{
  if (selected.size === 0) return;
  if (!confirm(`Delete ${selected.size} capture(s)?`)) return;
  fetch('/api/captures/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({files:Array.from(selected)})}).then(()=>{ selected.clear(); load(); });
});
load();
</script>
</body>
</html>
